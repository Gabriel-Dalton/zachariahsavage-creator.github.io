<!DOCTYPE html>
<html lang="en" class="site-boot-locked">
  <head>
    <script>
      document.documentElement.classList.add("site-boot-locked");
    </script>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Gallery — Zach Savage Photography</title>
    <meta
      name="description"
      content="Concert and event photo galleries by Zach Savage — live shows at Longboat Hall, The Drake, Hard Luck, and more Toronto venues."
    />
    <link rel="canonical" href="https://www.zachsavagephotography.ca/full-gallery.html" />
    <meta name="theme-color" content="#f0f0f0" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Gallery — Zach Savage Photography" />
    <meta
      property="og:description"
      content="Concert and event photo galleries by Toronto photographer Zach Savage."
    />
    <meta
      property="og:url"
      content="https://www.zachsavagephotography.ca/full-gallery.html"
    />
    <meta
      property="og:image"
      content="https://www.zachsavagephotography.ca/zach-savage-portrait.webp"
    />
    <meta name="twitter:card" content="summary_large_image" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23050505'/%3E%3Ctext x='32' y='43' font-family='Arial,Helvetica,sans-serif' font-size='30' font-weight='700' fill='%23ffffff' text-anchor='middle'%3EZS%3C/text%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Non-blocking font load: a slow font CDN must never delay first paint. -->
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <link rel="stylesheet" href="styles.css" />
    <script defer src="gallery-menu.js"></script>
    <script defer src="onepage.js"></script>
  </head>
  <body class="page-full-gallery">
    <div id="site-boot-gate" class="site-boot-gate" aria-live="polite" aria-busy="true"></div>
    <div class="full-gallery-page-bg" aria-hidden="true">
      <img
        src="gallery-page-backdrop.webp"
        alt=""
        width="1920"
        height="1280"
        data-asset-path="gallery-page-backdrop.webp"
        loading="eager"
        decoding="sync"
        fetchpriority="high"
        class="priority-render-img"
      />
    </div>
    <nav class="header-social" aria-label="Social and email">
      <a
        class="header-social__link"
        href="https://www.instagram.com/zach.a.r.i.a.h/"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Instagram"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.35" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5" />
          <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z" />
          <line x1="17.5" y1="6.5" x2="17.51" y2="6.5" />
        </svg>
      </a>
      <a
        class="header-social__link"
        href="mailto:zachariahsavage@gmail.com"
        aria-label="Email Zach Savage"
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.35" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="2" y="4" width="20" height="16" rx="2" />
          <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
        </svg>
      </a>
    </nav>
    <a class="page-center-title" href="index.html">ZACH SAVAGE PHOTOGRAPHY</a>
    <header class="gallery-bar" aria-label="Site header">
      <div class="gallery-bar__anchor">
        <div class="gallery-bar__brand" id="gallery-bar-menu">
          <div class="gallery-bar__brand-row">
            <h1 class="gallery-bar__title" id="section-title" aria-live="polite">
              gallery
            </h1>
            <button
              class="gallery-bar__menu-trigger"
              type="button"
              aria-label="Open menu"
              aria-expanded="false"
            >
              <span class="gallery-bar__menu-icon" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
              </span>
            </button>
          </div>
          <div class="gallery-bar__menu-content" aria-hidden="true">
            <div class="gallery-bar__menu-inner">
              <a class="gallery-bar__menu-link" href="index.html">home</a>
              <a class="gallery-bar__menu-link" href="full-gallery.html">gallery</a>
              <a class="gallery-bar__menu-link" href="index.html#contact-heading">contact</a>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main class="page page--onepage">
      <section
        class="onepage-section onepage-section--gallery"
        id="gallery-section"
        data-section-label="gallery"
        aria-label="Gallery"
      >
        <h1 class="full-gallery-heading">Gallery</h1>
        <section class="portfolio">
          <div class="portfolio-controls" aria-label="Gallery controls">
            <div class="portfolio-meta" id="portfolio-meta" aria-hidden="true"></div>
          </div>

          <div class="portfolio-grid" id="gallery-grid" aria-label="Gallery grid"></div>
        </section>
      </section>
    </main>

    <div class="lightbox" aria-modal="true" role="dialog" data-state="closed">
      <div class="lightbox__backdrop"></div>
      <div class="lightbox__content">
        <button class="lightbox__close" type="button" aria-label="Close">
          <span class="lightbox__close-icon" aria-hidden="true">✕</span>
        </button>
        <button
          class="lightbox__arrow lightbox__arrow--prev"
          type="button"
          aria-label="Previous image"
        >
          <span class="lightbox__arrow-icon" aria-hidden="true">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path d="M15 18l-6-6 6-6" />
            </svg>
          </span>
        </button>
        <button
          class="lightbox__arrow lightbox__arrow--next"
          type="button"
          aria-label="Next image"
        >
          <span class="lightbox__arrow-icon" aria-hidden="true">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path d="M9 6l6 6-6 6" />
            </svg>
          </span>
        </button>
        <div class="lightbox__media">
          <img class="lightbox__image" alt="" />
          <video class="lightbox__video" muted playsinline loop></video>
        </div>
      </div>
    </div>

  </body>
</html>
